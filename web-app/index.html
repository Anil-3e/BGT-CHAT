<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BGT Chat - a shared classroom chat for web and Windows.">
    <title>BGT Chat</title>
    <link rel="stylesheet" href="style.css?v=2.0.0">
    <script src="script.js?v=2.0.0" defer></script>
</head>
<body>
    <main class="app-shell">
        <header class="app-header">
            <div class="brand-mark" aria-hidden="true">BGT</div>
            <div>
                <p class="eyebrow">British Gymnasium of Technology</p>
                <h1>BGT Chat</h1>
            </div>
        </header>

        <section id="joinPanel" class="card join-panel">
            <div class="section-heading">
                <p class="eyebrow">Welcome</p>
                <h2>Join a classroom room</h2>
                <p>Enter your display name and the room code given by your teacher.</p>
            </div>

            <form id="joinForm" novalidate>
                <label for="username">Username</label>
                <input
                    id="username"
                    name="username"
                    type="text"
                    maxlength="40"
                    autocomplete="nickname"
                    placeholder="For example, Alex"
                    required>

                <label for="roomCode">Room code</label>
                <input
                    id="roomCode"
                    name="roomCode"
                    type="text"
                    maxlength="30"
                    autocomplete="off"
                    placeholder="For example, BGT2026"
                    required>
                <p class="field-help">Use any room code, for example BGT2026 or 221.</p>

                <button id="joinButton" class="primary-button" type="submit">Join Room</button>
                <p id="joinStatus" class="status-message" role="alert"></p>
                <button id="openLocalButton" class="text-button" type="button">Open installed web app</button>
            </form>
        </section>

        <section id="chatPanel" class="card chat-panel hidden" aria-label="Chat room">
            <div class="chat-toolbar">
                <div>
                    <p class="eyebrow">Current room</p>
                    <h2 id="activeRoom">Room</h2>
                    <p id="activeUser" class="signed-in-as"></p>
                </div>
                <button id="leaveButton" class="secondary-button" type="button">Leave Room</button>
            </div>

            <div class="search-row">
                <label class="visually-hidden" for="searchMessages">Search messages</label>
                <input
                    id="searchMessages"
                    type="search"
                    placeholder="Search messages by keyword..."
                    autocomplete="off">
            </div>

            <div id="messages" class="messages" aria-live="polite" aria-busy="false">
                <p class="empty-state">Messages will appear here.</p>
            </div>

            <form id="messageForm" class="message-form" novalidate>
                <label class="visually-hidden" for="messageInput">Message</label>
                <input
                    id="messageInput"
                    type="text"
                    maxlength="1000"
                    placeholder="Write a message..."
                    autocomplete="off"
                    required>
                <button id="sendButton" class="primary-button" type="submit">Send</button>
            </form>

            <div class="chat-footer">
                <p id="chatStatus" class="status-message" role="status"></p>
                <p class="refresh-note">Updates automatically every 3 seconds</p>
            </div>
        </section>
    </main>

</body>
</html>
